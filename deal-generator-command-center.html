<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#10162B; --panel:#1A2340; --panel2:#141B33; --line:#2A3558;
    --amber:#F5A623; --hot:#FF5A47; --cool:#6FA8FF; --dead:#6B7490;
    --text:#EDEFF6; --mute:#9AA3BC; --green:#3ECF8E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
  body { padding-bottom: 92px; -webkit-user-select:none; user-select:none; }
  input, textarea { -webkit-user-select:text; user-select:text; }
  ::-webkit-scrollbar { width:0; height:0; }
  .disp { font-family:'Barlow Condensed',sans-serif; }
  button { font-family:inherit; }
  input:focus, textarea:focus, button:focus-visible { outline:2px solid var(--amber); outline-offset:1px; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }

  header.app-head{ position:sticky; top:0; z-index:10; background:rgba(16,22,43,.95); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px 16px 12px; }
  .brand{ font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; letter-spacing:1.2px; line-height:1; }
  .brand span{ color:var(--amber); }
  .subhead{ font-size:11.5px; color:var(--mute); margin-top:3px; letter-spacing:.3px; }

  main{ padding:0 14px; max-width:560px; margin:0 auto; }

  .section-title{ display:flex; align-items:baseline; justify-content:space-between; margin:22px 2px 10px; }
  .section-title .label{ font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:2.2px; color:var(--mute); text-transform:uppercase; }
  .section-title .right{ font-size:12px; color:var(--mute); }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .card + .card{ margin-top:8px; }

  .tier-chip{ font-family:'Barlow Condensed',sans-serif; border-radius:4px; padding:1px 7px; font-size:13px; font-weight:700; letter-spacing:.8px; border:1px solid; }

  /* Today tab */
  .block-row{ display:flex; gap:12px; padding:12px 14px; }
  .block-time{ font-family:'Barlow Condensed',sans-serif; color:var(--amber); font-weight:700; font-size:20px; min-width:46px; line-height:1.1; }
  .block-time .mins{ font-size:12px; color:var(--mute); font-weight:600; font-family:'Inter',sans-serif; }
  .block-name{ font-weight:600; font-size:14.5px; color:var(--text); }
  .block-desc{ font-size:12.5px; color:var(--mute); margin-top:2px; line-height:1.5; }

  .kpi-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kpi-field{ font-size:12px; color:var(--mute); }
  .kpi-field input{ display:block; width:100%; margin-top:4px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:18px; font-weight:600; padding:10px 12px; }
  .kpi-summary{ display:flex; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:13px; color:var(--mute); }
  .kpi-note{ font-size:12px; color:var(--mute); margin-top:8px; line-height:1.5; }

  /* Roadmap tab */
  .progress-card{ margin-top:18px; display:flex; align-items:center; gap:14px; }
  .progress-pct{ font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:700; color:var(--amber); line-height:1; }
  .progress-sub{ font-size:13px; color:var(--mute); margin-bottom:6px; }
  .progress-bar-track{ height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; }
  .progress-bar-fill{ height:100%; background:var(--amber); border-radius:3px; transition:width .3s; }

  .day-title{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; letter-spacing:.5px; color:var(--text); margin-bottom:8px; }
  .check-row{ display:flex; gap:10px; align-items:flex-start; width:100%; text-align:left; background:none; border:none; padding:7px 0; cursor:pointer; }
  .check-box{ width:19px; height:19px; border-radius:5px; flex-shrink:0; margin-top:1px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--bg); font-size:13px; font-weight:800; }
  .check-box.on{ border-color:var(--green); background:var(--green); }
  .check-label{ font-size:14px; line-height:1.45; color:var(--text); }
  .check-label.on{ color:var(--dead); text-decoration:line-through; }

  /* Scripts tab */
  .profile-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .profile-field{ font-size:11px; color:var(--mute); }
  .profile-field input{ display:block; width:100%; margin-top:4px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:13px; padding:8px 9px; }
  .profile-note{ font-size:11.5px; color:var(--mute); margin:8px 4px 0; line-height:1.5; }

  .sec-toggle{ width:100%; display:flex; align-items:center; justify-content:space-between; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-top:12px; cursor:pointer; }
  .sec-toggle.open{ border-color:rgba(245,166,35,.4); }
  .sec-toggle-label{ display:flex; align-items:center; gap:8px; }
  .sec-toggle-name{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:.6px; color:var(--text); }
  .sec-toggle-count{ color:var(--mute); font-size:13px; }

  .scripts-list{ display:flex; flex-direction:column; gap:10px; margin-top:10px; }
  .script-btn{ background:none; border:none; padding:0; text-align:left; cursor:pointer; width:100%; }
  .script-meta{ font-size:11.5px; color:var(--mute); margin:0 4px 4px; display:flex; justify-content:space-between; }
  .script-meta .copied{ color:var(--green); font-weight:600; }
  .script-bubble{ background:var(--panel2); border:1px solid var(--line); border-radius:14px 14px 14px 4px; padding:11px 14px; font-size:14px; line-height:1.55; color:var(--text); white-space:pre-wrap; transition:background .2s,border .2s; }
  .script-bubble.copied{ background:#1f3a2c; border-color:rgba(62,207,142,.4); }

  /* Rules tab */
  .tier-card{ border-left:4px solid var(--line); }
  .tier-name{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; letter-spacing:1px; }
  .tier-rules{ font-size:13.5px; color:var(--text); line-height:1.55; margin-top:5px; }
  .tier-action{ font-size:12.5px; color:var(--mute); margin-top:6px; }

  table.buybox{ width:100%; border-collapse:collapse; font-size:14px; }
  table.buybox td{ padding:9px 0; }
  table.buybox tr{ border-bottom:1px solid var(--line); }
  table.buybox tr:last-child{ border-bottom:none; }
  table.buybox td.amt{ font-family:'Barlow Condensed',sans-serif; text-align:right; font-weight:700; font-size:17px; letter-spacing:.5px; }

  /* Leads tab */
  .lead-summary{ display:flex; gap:10px; margin-top:18px; }
  .lead-stat{ flex:1; text-align:center; }
  .lead-stat .n{ font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700; line-height:1; }
  .lead-stat .l{ font-size:10.5px; color:var(--mute); letter-spacing:.6px; text-transform:uppercase; margin-top:3px; }

  .add-lead-btn{ width:100%; margin-top:14px; background:var(--amber); color:#1A1206; border:none; border-radius:10px; padding:13px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.8px; cursor:pointer; }
  .add-lead-btn.editing{ background:var(--panel2); color:var(--text); border:1px solid var(--line); }

  .lead-form .field{ margin-top:10px; font-size:11.5px; color:var(--mute); display:block; }
  .lead-form .field input, .lead-form .field select, .lead-form .field textarea{ display:block; width:100%; margin-top:4px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; padding:9px 10px; font-family:'Inter',sans-serif; }
  .lead-form .field textarea{ resize:vertical; min-height:50px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .field-row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .struct-row{ display:flex; gap:6px; margin-top:10px; }
  .struct-btn{ flex:1; background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 4px; text-align:center; cursor:pointer; font-size:12px; color:var(--mute); font-weight:600; }

      if (c === '"') inQuotes = true;
      else if (c === ','){ row.push(field); field = ""; }
      else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if (c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ""));
}

function firstNumber(str){
  if (!str) return "";
  const m = String(str).replace(/,/g,"").match(/-?\d+(\.\d+)?/);
  return m ? m[0] : "";
}

function structureKeyFromLabel(label){
  const found = STRUCTURES.find(s => s.label.toLowerCase() === (label||"").trim().toLowerCase());
  return found ? found.k : "cash";
}

// Map Sheet columns -> lead schema. Header names must match the tracker's header row.
function sheetRowsToLeads(rows){
  if (!rows.length) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = (name) => header.indexOf(name.toLowerCase());
  const col = { date:idx("date added"), addr:idx("address"), city:idx("city"), state:idx("state"),
    struct:idx("structure"), tier:idx("tier"), stage:idx("pipeline stage"), beds:idx("beds"), baths:idx("baths"),
    sqft:idx("sqft"), year:idx("year built"), price:idx("asking price"), rent:idx("est. rent"),
    verdict:idx("buy box verdict"), agent:idx("agent/contact"), url:idx("zillow url"), notes:idx("notes") };

  return rows.slice(1).filter(r => r[col.addr] && r[col.addr].trim()).map(r => {
    const g = (i) => (i > -1 && r[i] != null) ? r[i].trim() : "";
    const extras = [];
    if (g(col.stage)) extras.push(`Stage: ${g(col.stage)}`);
    if (g(col.verdict)) extras.push(`Buy-box: ${g(col.verdict)}`);
    if (g(col.url)) extras.push(`Zillow: ${g(col.url)}`);
    const notesCombined = [g(col.notes), extras.join(" · ")].filter(Boolean).join("\n");
    return {
      address: g(col.addr), city: g(col.city), state: g(col.state),
      structure: structureKeyFromLabel(g(col.struct)),
      tier: g(col.tier) && ["T1","T2","T3","DEAD"].includes(g(col.tier).toUpperCase()) ? g(col.tier).toUpperCase() : "T3",
      price: firstNumber(g(col.price)), rent: firstNumber(g(col.rent)),
      beds: firstNumber(g(col.beds)), baths: firstNumber(g(col.baths)),
      sqft: firstNumber(g(col.sqft)), year: firstNumber(g(col.year)),
      agent: g(col.agent), notes: notesCombined,
    };
  });
}

function esc(s){
  const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML;
}
function todayKey(){ return new Date().toISOString().slice(0,10); }

function money(n){ return n || n===0 ? "$" + Number(n).toLocaleString() : "—"; }
function newLeadId(){ return "lead_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

// Dedupe key: address + city + state, normalized. Same property = same key, regardless of casing/spacing.
function leadKey(l){
  return [l.address, l.city, l.state].map(x => (x||"").trim().toLowerCase().replace(/\s+/g," ")).join("|");
}

// Merge an incoming array of lead-like objects into state.leads.
// Existing address -> update in place (keeps local id/tier history). New address -> insert.
function mergeLeads(incoming){
  if (!Array.isArray(incoming)) throw new Error("Expected a JSON array of leads.");
  const byKey = {};
  state.leads.forEach(l => { byKey[leadKey(l)] = l; });
  let added = 0, updated = 0, skipped = 0;
  incoming.forEach(raw => {
    if (!raw || !raw.address) { skipped++; return; }
    const key = leadKey(raw);
    if (byKey[key]){
      const idx = state.leads.findIndex(l => l.id === byKey[key].id);
      const merged = Object.assign({}, EMPTY_LEAD, byKey[key], raw, { id: byKey[key].id, createdAt: byKey[key].createdAt });
      state.leads[idx] = merged;
      byKey[key] = merged;
      updated++;
    } else {
      const clean = Object.assign({}, EMPTY_LEAD, raw, { id: newLeadId(), createdAt: raw.createdAt || Date.now() });
      state.leads.push(clean);
      byKey[key] = clean;
      added++;
    }
  });
  persist();
  return { added, updated, skipped };
}

// Section 8 buy box — exact thresholds only. No rule = no verdict, not a guess.
function s8Verdict(rent, price){
  const r = rent === "" || rent == null ? null : Number(rent);
  const p = price === "" || price == null ? null : Number(price);
  if (r == null) return { level:"none", text:"Add rent to check against the Section 8 buy box." };
  if (r >= 900 && r <= 1100) return { level:"avoid", text:`$${r}/mo rent — inside the $900–$1,100 avoid zone. Pass.` };
  let max = null, basis = "";
  if (r >= 1400) { max = 80000; basis = "≥ $1,400/mo bracket"; }
  else if (r >= 1300) { max = 70000; basis = "$1,300/mo bracket"; }
  else if (r >= 1200) { max = 65000; basis = "$1,200/mo bracket"; }
  else if (r > 1100 && r < 1200) return { level:"undefined", text:`$${r}/mo falls between $1,100–$1,200 — no threshold defined. Use judgment.` };
  else if (r < 900) return { level:"undefined", text:`$${r}/mo is below the $900 floor — outside the defined buy box. Use judgment.` };
  if (max == null) return { level:"none", text:"Rent entered but no bracket matched — check the number." };
  if (p == null) return { level:"partial", text:`Bracket: ${basis} → max ${money(max)}. Add asking price to check fit.` };
  if (p <= max) return { level:"ok", text:`Within buy box — ${basis}, max ${money(max)}, asking ${money(p)}.` };
  return { level:"over", text:`Over threshold — ${basis} caps at ${money(max)}, asking is ${money(p)} (+${money(p-max)}).` };
}

// FL cash / fix-flip buy box — informational checklist, not a hard gate.
function cashChecklist(beds, year, price){
  const rows = [];
  rows.push({ label:"3+ beds", ok: beds==="" || beds==null ? null : Number(beds) >= 3 });
  rows.push({ label:"Built after 1970", ok: year==="" || year==null ? null : Number(year) > 1970 });
  rows.push({ label:"Under $200k", ok: price==="" || price==null ? null : Number(price) < 200000 });
  return rows;
}

function isS8Market(city){
  if (!city) return null;
  return S8_MARKETS.includes(city.trim().toLowerCase());
}

// PLAY 1 — Cash Wholesale: ARV x 70% - rehab = ceiling. Open ask = ceiling - target fee.
function calcCashWholesale(l){
  const arv = Number(l.arv), sqft = Number(l.sqft);
  if (!arv || !sqft) return null;
  const rate = DEAL_RULES.rehabRate[l.rehabTier] || DEAL_RULES.rehabRate.heavy;
  const rehabCost = sqft * rate;
  const maxOffer = arv * DEAL_RULES.wholesalePct - rehabCost;
  const openOffer = maxOffer - DEAL_RULES.openFeeTarget;
  const walkAway = maxOffer; // walk away above the ceiling
  return {
    arv, rehabCost, rehabRate: rate, maxOffer,
    openOffer: Math.max(openOffer, 0),
    walkAway,
    feeAtOpen: maxOffer - Math.max(openOffer, 0),
  };
}

// PLAY 2 — Seller Finance: purchase price = ARV x 75%, 6.5% down, 0% note, 30yr, 7yr balloon.
function calcSellerFinance(l){
  const arv = Number(l.arv);
  const rent = Number(l.rent);
  if (!arv) return null;
  const purchasePrice = arv * (1 - DEAL_RULES.sfBelowArv);
  const down = purchasePrice * DEAL_RULES.sfDownPct;
  const loan = purchasePrice - down;
  const monthlyPI = loan / (DEAL_RULES.sfTermYears * 12); // 0% note = straight amortization
  const taxIns = l.estTaxIns === "" || l.estTaxIns == null ? null : Number(l.estTaxIns);
  const cashFlow = (rent && taxIns != null) ? (rent - monthlyPI - taxIns) : null;
  return { purchasePrice, down, loan, monthlyPI, rent: rent || null, taxIns, cashFlow };
}

// Simple, transparent local scoring heuristic — NOT a recreation of any prior tool's exact
// algorithm, just tier + buy-box fit + stated risk flags (motivation signals) added up.
function leadScore(l){
  let score = 0;
  const tierPts = { T1:100, T2:60, T3:30, DEAD:0 };
  score += tierPts[l.tier] || 0;
  if (l.structure === "s8"){
    const v = s8Verdict(l.rent, l.price);
    if (v.level === "ok") score += 25;
    else if (v.level === "partial") score += 10;
  }
  if (l.structure === "cash"){
    const rows = cashChecklist(l.beds, l.year, l.price);
    score += rows.filter(r => r.ok === true).length * 8;
  }
  RISK_FLAGS.forEach(f => { if (l[f.k]) score += 10; });
  const cw = calcCashWholesale(l);
  if (cw && cw.maxOffer > 0) score += 15;
  return score;
}

function rankLeads(leads){
  const active = leads.filter(l => l.tier !== "DEAD");
  const ranked = active.slice().sort((a,b) => leadScore(b) - leadScore(a));
  const map = {};
  ranked.forEach((l, i) => { map[l.id] = { rank: i+1, of: ranked.length, score: leadScore(l) }; });
  return map;
}

// Rule-based reply classifier — plain pattern matching, not real language understanding.
// Mirrors the Section 2/3 tier logic from your scripts: address = T1, opt-out = DEAD, soft-yes = T3.
// Always double-check the suggestion — this catches the obvious cases, not every phrasing.
function classifyReply(text){
  const raw = (text || "").trim();
  if (!raw) return null;
  const t = raw.toLowerCase();

  const deadPatterns = [/\bstop\b/, /remove me/, /don'?t (contact|text|call)/, /not interested/, /no thanks?/, /unsubscribe/, /leave me alone/, /lose my number/, /wrong number/];
  for (const p of deadPatterns){
    if (p.test(t)) return { tier:"DEAD", reason:`Auto-tiered DEAD — opt-out language matched ("${p.source.replace(/\\b|\\?|\(|\)/g,"")}").` };
  }

  const addressPattern = /\d{1,6}\s+[a-z0-9.'\s]{2,35}\b(st|street|ave|avenue|rd|road|dr|drive|ln|lane|blvd|boulevard|ct|court|way|pl|place|cir|circle|pkwy|parkway|hwy|highway)\b/i;
  if (addressPattern.test(raw)){
    return { tier:"T1", reason:"Auto-tiered T1 — looks like an address was given. Verify and start the 3–6 hr callback clock." };
  }

  const nurturePatterns = [/might have/, /keep (me|you) in mind/, /check (back|in)/, /\bmaybe\b/, /not (right )?now/, /nothing (right )?now/, /in the future/, /down the road/, /keep you posted/, /i'?ll let you know/];
  for (const p of nurturePatterns){
    if (p.test(t)) return { tier:"T3", reason:"Auto-tiered T3 — soft response, permission to follow up, no address yet." };
  }

  return { tier:"T3", reason:"No clear address or opt-out detected — defaulted to T3. Read the reply and adjust manually if needed." };
}

function fillTemplate(t, p){
  return t.replaceAll("{NAME}", p.name || "[YOUR NAME]")
           .replaceAll("{BIZ}", p.biz || "[BUSINESS NAME]")

}

function copyText(id, text){
  const done = () => { copiedId = id; render(); setTimeout(() => { copiedId = null; render(); }, 1400); };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta); done();
}

function renderLeadCard(l, rankInfo){
  const t = TIERS.find(x => x.k === l.tier);
  const s = STRUCTURES.find(x => x.k === l.structure);
  const sc = (l.state || "").trim().toUpperCase() === "SC";
  const color = t ? t.c : "var(--line)";

  const TIER_META = {
    T1:  { icon:"🔥", label:"HOT" },
    T2:  { icon:"⚡", label:"WARM" },
    T3:  { icon:"🌱", label:"NURTURE" },
    DEAD:{ icon:"⛔", label:"DEAD" },
  };
  const meta = TIER_META[l.tier] || TIER_META.T3;
  const rankText = rankInfo ? `Rank #${rankInfo.rank} of ${rankInfo.of} · Score ${rankInfo.score}` : "Not ranked";

  // caution banner — risk flags + SC + REO
  const activeRisk = RISK_FLAGS.filter(f => l[f.k]);
  const cautionParts = activeRisk.map(f => f.label);
  if (l.reo) cautionParts.push("REO/bank-owned");
  if (sc) cautionParts.push("SC — excluded market");
  const hasCaution = cautionParts.length > 0;

  // flag chips
  let flagChips = "";
  activeRisk.forEach(f => { flagChips += `<span class="flag-badge" style="background:${color}22;color:${color};">${esc(f.label)}</span>`; });
  if (sc) flagChips += `<span class="flag-badge" style="background:rgba(255,90,71,.18);color:var(--hot);">SC — EXCLUDED</span>`;
  if (l.reo) flagChips += `<span class="flag-badge" style="background:rgba(255,90,71,.18);color:var(--hot);">REO</span>`;
  if (l.structure === "s8" && l.rent){
    const v = s8Verdict(l.rent, l.price);
    const map = { ok:["Within buy box","var(--green)"], over:["Over threshold","var(--hot)"], avoid:["Avoid zone","var(--hot)"], undefined:["No rule set","var(--amber)"] };
    if (map[v.level]) flagChips += `<span class="flag-badge" style="background:${map[v.level][1]}22;color:${map[v.level][1]};">${map[v.level][0]}</span>`;
  }

  const specs = [];
  if (l.beds) specs.push(`${l.beds}bd`);
  if (l.baths) specs.push(`${l.baths}ba`);
  if (l.sqft) specs.push(`${Number(l.sqft).toLocaleString()} sqft`);
  if (l.year) specs.push(`built ${l.year}`);

  // PLAY 1 — Cash Wholesale
  const cw = calcCashWholesale(l);
  let cwHtml = "";
  if (cw){
    cwHtml = `<div class="play-block">
      <div class="play-label">Play — Cash Wholesale</div>
      <div class="offer-range-box">
        <div class="offer-range-label">Your offer range</div>
        <div class="offer-range-num">${money(cw.openOffer)} – ${money(cw.walkAway)}</div>
        <div class="offer-range-sub">Open at ${money(cw.openOffer)} · Walk away above ${money(cw.walkAway)}</div>
        <div class="fee-pill">🔥 ${money(cw.feeAtOpen)} fee at open offer</div>
      </div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="v">${money(cw.arv)}</div><div class="l">Est. ARV</div></div>
        <div class="stat-cell"><div class="v">${money(cw.rehabCost)}</div><div class="l">Rehab (${esc(l.rehabTier)})</div></div>
        <div class="stat-cell"><div class="v">${money(cw.maxOffer)}</div><div class="l">Max offer</div></div>
        <div class="stat-cell"><div class="v">${money(cw.feeAtOpen)}</div><div class="l">Your fee</div></div>
      </div>
      <div class="deal-math">
        <div class="deal-math-row"><span>ARV</span><span>${money(cw.arv)}</span></div>
        <div class="deal-math-row"><span>× ${Math.round(DEAL_RULES.wholesalePct*100)}%</span><span>${money(cw.arv*DEAL_RULES.wholesalePct)}</span></div>
        <div class="deal-math-row"><span>− Rehab (${Number(l.sqft).toLocaleString()} × $${cw.rehabRate})</span><span>−${money(cw.rehabCost)}</span></div>
        <div class="deal-math-row total"><span>= Max offer</span><span>${money(cw.maxOffer)}</span></div>
        <div class="deal-math-row"><span>− Target fee</span><span>−${money(DEAL_RULES.openFeeTarget)}</span></div>
        <div class="deal-math-row total"><span>Open offer</span><span>${money(cw.openOffer)}</span></div>
      </div>
      ${l.rehabTags && l.rehabTags.length ? `<div class="rehab-tags">${l.rehabTags.map(rt => `<span class="rehab-tag">${esc(rt)}</span>`).join("")}</div>` : ""}
    </div>`;
  }

  // PLAY 2 — Seller Finance
  const sf = calcSellerFinance(l);
  let sfHtml = "";
  if (sf){
    const cfKnown = sf.cashFlow != null;
    const cfColor = cfKnown ? (sf.cashFlow >= 0 ? "var(--green)" : "var(--hot)") : "var(--mute)";
    const cfBg = cfKnown ? (sf.cashFlow >= 0 ? "rgba(62,207,142,.12)" : "rgba(255,90,71,.12)") : "var(--panel)";
    sfHtml = `<div class="play-block">
      <div class="play-label">Play — Seller Finance</div>
      <div class="sf-box">
        <div class="sf-terms">${Math.round(DEAL_RULES.sfBelowArv*100)}% below ARV · ${DEAL_RULES.sfRate}% · ${DEAL_RULES.sfTermYears}-yr · ${DEAL_RULES.sfBalloonYears}-yr balloon</div>
        <div class="sf-price">${money(sf.purchasePrice)} purchase price</div>
        <div class="sf-sub">Down: ${money(sf.down)} · Monthly P&I: ${money(Math.round(sf.monthlyPI))}${sf.rent ? ` · Est. rent: ${money(sf.rent)}/mo` : ""}</div>
        <div class="sf-cashflow" style="background:${cfBg};color:${cfColor};">
          ${cfKnown ? `${sf.cashFlow>=0?"✓":"✕"} ${money(Math.round(sf.cashFlow))}/mo cash flow (rent − P&I − est. taxes/insurance)` : "Add rent + est. taxes/insurance to see monthly cash flow"}
        </div>
      </div>
    </div>`;
  }

  return `<div class="card lead-card" style="box-shadow:0 0 0 1.5px ${color}, 0 0 16px ${color}66, 0 0 32px ${color}22;" data-lead-open="${l.id}">
    <div class="lead-rank-strip" style="background:${color}1e;color:${color};">
      <span>${meta.icon}</span><span>${rankInfo ? `Rank #${rankInfo.rank}` : ""}${rankInfo ? " · " : ""}${meta.label}${rankInfo ? ` · Score ${rankInfo.score}` : ""}</span>
    </div>
    ${hasCaution ? `<div class="lead-caution" style="background:${color}12;color:${color};"><b>⚠ Caution —</b> ${esc(cautionParts.join(" + "))}${l.buildNotes ? `<br>${esc(l.buildNotes)}` : ""}</div>` : ""}
    <div class="lead-body">
      <div class="lead-top">
        <div>
          <div class="lead-addr">${esc(l.address || "(no address)")}, ${esc([l.city,l.state].filter(Boolean).join(", "))}</div>
          <div class="lead-sub">${l.owner ? `Owner: ${esc(l.owner)} · ` : ""}${s ? esc(s.short) : ""}${specs.length ? " · " + esc(specs.join(" · ")) : ""}</div>
        </div>
        ${tierChip(l.tier)}
      </div>
      <div class="lead-mid">
        <div><b>ASKING</b>${money(l.price)}</div>
        ${l.rent ? `<div><b>RENT</b>${money(l.rent)}</div>` : ""}
        ${l.agent ? `<div><b>CONTACT</b>${esc(l.agent)}</div>` : ""}
      </div>
      ${flagChips ? `<div class="lead-flags">${flagChips}</div>` : ""}
      ${cwHtml}
      ${sfHtml}
      ${l.notes ? `<div class="lead-notes">${esc(l.notes)}</div>` : ""}
      ${(cw || sf) ? `<div class="assumption-note">Math uses your reference rules: 70% ARV rule, ${DEAL_RULES.rehabRate.heavy}/sqft heavy rehab, seller finance at 25% below ARV / 6.5% down / 0% / 30yr. Confirm these still match — adjust in DEAL_RULES if not.</div>` : ""}
    </div>
  </div>`;
}

/* ================= MAIN RENDER + EVENTS ================= */

function render(){
  const main = document.getElementById("main");
  if (tab === "today") main.innerHTML = renderToday();
  else if (tab === "leads") main.innerHTML = renderLeads();
  else if (tab === "roadmap") main.innerHTML = renderRoadmap();
  else if (tab === "scripts") main.innerHTML = renderScripts();
  else main.innerHTML = renderRules();

  const nav = document.getElementById("bottomNav");
  nav.innerHTML = TABS.map(t => `
    <button class="nav-btn ${tab===t.id?'active':''}" data-tab="${t.id}">
      <div class="nav-icon">${t.icon}</div>
      <div class="nav-label">${t.label}</div>
    </button>`).join("");

  attachEvents();
}

function attachEvents(){
  document.getElementById("bottomNav").querySelectorAll("[data-tab]").forEach(btn => {
    btn.onclick = () => { tab = btn.getAttribute("data-tab"); render(); window.scrollTo(0,0); };
  });

  const main = document.getElementById("main");

  main.querySelectorAll("[data-kpi]").forEach(inp => {
    inp.oninput = () => {
      const k = inp.getAttribute("data-kpi");
      const v = inp.value === "" ? undefined : Math.max(0, parseInt(inp.value)||0);
      const tk = todayKey();
      state.kpi[tk] = Object.assign({}, state.kpi[tk], { [k]: v });
      persist();
    };
  });

  main.querySelectorAll("[data-check]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-check");
      state.checks[id] = !state.checks[id];
      persist(); render();
    };
  });

  main.querySelectorAll("[data-profile]").forEach(inp => {
    inp.oninput = () => {
      const k = inp.getAttribute("data-profile");
      state.profile[k] = inp.value;
      persist();
      // live-update script previews without losing focus: re-render scripts text only if scripts tab open
      if (tab === "scripts") updateScriptBubblesInPlace();
    };
  });

  main.querySelectorAll("[data-sec]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-sec");
      openScriptSection = (openScriptSection === id) ? null : id;
      render();
    };
  });

  main.querySelectorAll("[data-copy]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-copy");
      const text = btn.getAttribute("data-text");
      const decoded = decodeHtmlEntities(text);
      copyText(id, decoded);
    };
  });

  /* ---- Leads tab ---- */

  const addLeadBtn = main.querySelector("[data-add-lead]");
  if (addLeadBtn) addLeadBtn.onclick = () => {
    leadForm = Object.assign({}, EMPTY_LEAD, { createdAt: Date.now() });
    render();
  };

  const syncBtn = main.querySelector("[data-sync-now]");
  if (syncBtn) syncBtn.onclick = () => syncFromSheet(false);

  const showUploadLink = main.querySelector("[data-show-upload]");
  if (showUploadLink) showUploadLink.onclick = () => { showUploadFallback = true; render(); };

  const fileInput = main.querySelector("#leadFileInput");
  if (fileInput){
    fileInput.onchange = () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const list = Array.isArray(data) ? data : (Array.isArray(data.leads) ? data.leads : null);
          if (!list) throw new Error("File doesn't contain a leads array.");
          const result = mergeLeads(list);
          uploadResultMsg = `Uploaded: ${result.added} new, ${result.updated} updated${result.skipped ? `, ${result.skipped} skipped (no address)` : ""}.`;
        } catch (e) {
          uploadResultMsg = "Couldn't read that file: " + e.message;
        }
        fileInput.value = "";
        render();
      };
      reader.onerror = () => { uploadResultMsg = "Couldn't read that file."; fileInput.value = ""; render(); };
      reader.readAsText(file);
    };
  }

  main.querySelectorAll("[data-filter-tier]").forEach(btn => {
    btn.onclick = () => { leadFilterTier = btn.getAttribute("data-filter-tier"); render(); };
  });
  main.querySelectorAll("[data-filter-struct]").forEach(btn => {
    btn.onclick = () => { leadFilterStruct = btn.getAttribute("data-filter-struct"); render(); };
  });

  main.querySelectorAll("[data-lead-open]").forEach(card => {
    card.onclick = () => {
      const id = card.getAttribute("data-lead-open");
      const found = state.leads.find(l => l.id === id);
      if (found) { leadForm = Object.assign({}, found); render(); window.scrollTo(0,0); }
    };
  });

  main.querySelectorAll("[data-lf]").forEach(el => {
    const key = el.getAttribute("data-lf");
    const handler = () => {
      if (!leadForm) return;
      leadForm[key] = el.type === "checkbox" ? el.checked : el.value;
      updateLeadFormInPlace();
    };
    if (el.tagName === "SELECT" || el.type === "checkbox") el.onchange = handler;
    else el.oninput = handler;
  });

  main.querySelectorAll("[data-lf-struct]").forEach(btn => {
    btn.onclick = () => { if (leadForm){ leadForm.structure = btn.getAttribute("data-lf-struct"); render(); } };
  });
  main.querySelectorAll("[data-lf-tier]").forEach(btn => {
    btn.onclick = () => { if (leadForm){ leadForm.tier = btn.getAttribute("data-lf-tier"); render(); } };
  });
  main.querySelectorAll("[data-lf-flag]").forEach(btn => {
    btn.onclick = () => { if (leadForm){ const k = btn.getAttribute("data-lf-flag"); leadForm[k] = !leadForm[k]; render(); } };
  });
  main.querySelectorAll("[data-lf-rehabtier]").forEach(btn => {
    btn.onclick = () => { if (leadForm){ leadForm.rehabTier = btn.getAttribute("data-lf-rehabtier"); render(); } };
  });
  main.querySelectorAll("[data-lf-rehabtag]").forEach(btn => {
    btn.onclick = () => {
      if (!leadForm) return;
      const tag = btn.getAttribute("data-lf-rehabtag");
      const cur = leadForm.rehabTags || [];
      leadForm.rehabTags = cur.includes(tag) ? cur.filter(x => x !== tag) : [...cur, tag];
      render();
    };
  });

  const autoTierBtn = main.querySelector("[data-lf-autotier]");
  if (autoTierBtn) autoTierBtn.onclick = () => {
    if (!leadForm) return;
    const result = classifyReply(leadForm.replyDraft);
    if (!result){ alert("Paste what the agent said first."); return; }
    leadForm.tier = result.tier;
    leadForm.lastTierReason = result.reason;
    const stamp = new Date().toLocaleDateString(undefined, { month:"short", day:"numeric" });
    const logLine = `[${stamp}] Agent replied: "${leadForm.replyDraft.trim()}" → ${result.tier}`;
    leadForm.notes = leadForm.notes ? (leadForm.notes + "\n" + logLine) : logLine;
    leadForm.replyDraft = "";
    render();
  };

  const saveBtn = main.querySelector("[data-lf-save]");
  if (saveBtn) saveBtn.onclick = () => {
    if (!leadForm.address || !leadForm.address.trim()){
      alert("Add an address before saving.");
      return;
    }
    if (leadForm.id){
      const idx = state.leads.findIndex(l => l.id === leadForm.id);
      if (idx > -1) state.leads[idx] = leadForm;
    } else {
      state.leads.push(Object.assign({}, leadForm, { id: newLeadId() }));
    }
    leadForm = null;
    persist(); render();
  };

  const cancelBtn = main.querySelector("[data-lf-cancel]");
  if (cancelBtn) cancelBtn.onclick = () => { leadForm = null; render(); };

  const deleteBtn = main.querySelector("[data-lf-delete]");
  if (deleteBtn) deleteBtn.onclick = () => {
    if (confirm("Delete this lead? This can't be undone.")){
      state.leads = state.leads.filter(l => l.id !== leadForm.id);
      leadForm = null;
      persist(); render();
    }
  };
}

function updateLeadFormInPlace(){
  const active = document.activeElement;
  const isLfField = active && active.hasAttribute && active.hasAttribute("data-lf") && (active.tagName === "INPUT" || active.tagName === "TEXTAREA");
  if (isLfField){
    const attr = active.getAttribute("data-lf");
    const caret = active.selectionStart;
    render();
    const el = document.querySelector(`[data-lf="${attr}"]`);
    if (el && el.type !== "checkbox") { el.focus(); try{ el.setSelectionRange(caret, caret); }catch(e){} }
  } else {
    render();
  }
}

function decodeHtmlEntities(s){
  const d = document.createElement("div"); d.innerHTML = s; return d.textContent;
}

function updateScriptBubblesInPlace(){
  // cheap approach: just re-render (input blur risk is minor, acceptable for this use case)
  const active = document.activeElement;
  const tagName = active && active.tagName;
  if (tagName === "INPUT") {
    const attr = active.getAttribute("data-profile");
    const caret = active.selectionStart;
    render();
    const el = document.querySelector(`[data-profile="${attr}"]`);
    if (el) { el.focus(); try{ el.setSelectionRange(caret, caret); }catch(e){} }
  } else {
    render();
  }
}
